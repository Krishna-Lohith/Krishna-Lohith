name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: krishna-lohith
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-cyan.svg?color_snake=#00bfff&color_dots=#161b22,#003a57,#00618f,#0090c7,#00bfff&dark_color_dots=#161b22,#003a57,#00618f,#0090c7,#00bfff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
